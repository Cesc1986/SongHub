services:
  songhub:
    build: .
    container_name: songhub
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      # Saved tabs persist outside the container
      - ./saved-tabs:/app/saved-tabs
    environment:
      - NODE_ENV=production
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - DISPLAY=:99
      # Login credentials: define in .env (same folder as docker-compose.yml)
      - SONGHUB_LOGIN_USERNAME=${SONGHUB_LOGIN_USERNAME:-admin}
      - SONGHUB_LOGIN_PASSWORD=${SONGHUB_LOGIN_PASSWORD:-geheim}
